# =============================================================================
# Respeaker Lite — Constant UDP streaming mode (NO custom component)
# -----------------------------------------------------------------------------
# Uses only stock ESPHome components: `udp` + the existing `i2s_mics`
# microphone's `on_data` trigger. A Switch in Home Assistant toggles between:
#   - OFF (default): normal Voice Assistant (wake-word) operation
#   - ON : constant microphone streaming to the voice-trigger server over UDP
#
# SETUP (2 steps):
#   1. In your base satellite YAML, add `on_data:` to the existing
#      `microphone:` block that defines `i2s_mics` (see "MIC PATCH" below).
#   2. Include this file (or paste it) into your satellite config.
#
# The voice-trigger server resamples 48 kHz -> 16 kHz on its side, so this
# file only forwards 16-bit mono frames over UDP.
# =============================================================================

# --- MIC PATCH -------------------------------------------------------------
# Add this `on_data` block INSIDE your existing `microphone:` -> `i2s_mics`
# definition in the base config (respeaker-satellite-base.yaml or your
# local override). It downmixes stereo->mono and sends over UDP whenever
# streaming mode is active.
#
#   microphone:
#     - platform: i2s_audio
#       id: i2s_mics
#       # ... existing settings ...
#       on_data:
#         then:
#           - if:
#               condition:
#                 switch.is_on: streaming_mode
#               then:
#                 - udp.write:
#                     id: udp_stream_hub
#                     data: !lambda |-
#                       std::vector<uint8_t> out;
#                       const int16_t *s = reinterpret_cast<const int16_t*>(x.data());
#                       size_t n = x.size() / sizeof(int16_t);
#                       for (size_t i = 0; i < n; i += 2) {
#                         int32_t mono = (int32_t)s[i] + (int32_t)s[i+1];
#                         int16_t m = (int16_t)(mono / 2);
#                         out.push_back((uint8_t)(m & 0xFF));
#                         out.push_back((uint8_t)((m >> 8) & 0xFF));
#                       }
#                       return out;
# ---------------------------------------------------------------------------

# UDP transport used to send raw audio packets.
udp:
  id: udp_stream_hub

# Switch to toggle between Voice Assistant and constant streaming.
switch:
  - platform: template
    name: "Streaming mode"
    id: streaming_mode
    icon: "mdi:broadcast"
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config
    on_turn_on:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
      - delay: 200ms
      # Start capturing mic frames so on_data fires.
      - microphone.capture: i2s_mics
      - logger.log: "Switched to constant UDP streaming"
    on_turn_off:
      - microphone.stop_capture: i2s_mics
      - delay: 200ms
      - if:
          condition:
            api.connected:
          then:
            - voice_assistant.start:
      - logger.log: "Returned to Voice Assistant mode"
